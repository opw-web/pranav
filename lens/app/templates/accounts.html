{% extends "base.html" %}
{% block title %}Accounts — LENS{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-lg font-semibold mb-4">Accounts</h1>

    <div class="bg-white border border-neutral-200 rounded-lg overflow-hidden mb-6">
        {% include "partials/account_list.html" %}
    </div>

    <details class="bg-white border border-neutral-200 rounded-lg p-4">
        <summary class="text-sm font-medium cursor-pointer">+ Add an account</summary>
        <form hx-post="/accounts" hx-target="#accounts-table" hx-swap="outerHTML" class="mt-3 flex flex-wrap gap-2">
            <input name="name" placeholder="Account name" required
                   class="border border-neutral-300 rounded px-2 py-1 text-sm flex-1 min-w-[140px]" />
            <select name="type" class="border border-neutral-300 rounded px-2 py-1 text-sm">
                <option value="bank">Bank</option>
                <option value="cash">Cash</option>
                <option value="credit_card">Credit Card</option>
                <option value="wallet">Wallet</option>
            </select>
            <input name="currency" value="INR" class="border border-neutral-300 rounded px-2 py-1 text-sm w-20" />
            <input name="opening_balance" type="number" step="0.01" value="0" placeholder="Opening balance"
                   class="border border-neutral-300 rounded px-2 py-1 text-sm w-32" />
            <button type="submit" class="bg-neutral-800 text-white rounded px-3 py-1 text-sm">Add</button>
        </form>
    </details>
</div>
{% endblock %}
