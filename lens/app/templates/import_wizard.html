{% extends "base.html" %}
{% block title %}Import — LENS{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-lg font-semibold mb-1">Import a bank statement</h1>
    <p class="text-sm text-neutral-500 mb-4">Drop a CSV. LENS detects the format, remembers it, and auto-categorizes.</p>

    <form hx-post="/import/upload" hx-target="#import-step" hx-swap="innerHTML"
          hx-encoding="multipart/form-data" class="bg-white border border-neutral-200 rounded-lg p-4 space-y-3">
        <label class="block text-sm font-medium">Target account
            <select name="account_id" required class="mt-1 block w-full border border-neutral-300 rounded px-2 py-1 text-sm">
                {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
            </select>
        </label>
        <label class="block text-sm font-medium">CSV file
            <input type="file" name="file" accept=".csv,text/csv" required
                   class="mt-1 block w-full text-sm text-neutral-600" />
        </label>
        <button type="submit" class="bg-neutral-800 text-white rounded px-3 py-1.5 text-sm">Analyze</button>
    </form>

    <div id="import-step" class="mt-6"></div>
</div>
{% endblock %}
