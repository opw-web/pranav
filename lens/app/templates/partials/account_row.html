<tr id="account-row-{{ a.id }}" class="border-b border-neutral-100">
    <td class="py-2 px-3">
        <form hx-patch="/accounts/{{ a.id }}" hx-target="#account-row-{{ a.id }}" hx-swap="outerHTML">
            <input name="name" value="{{ a.name }}"
                   class="bg-transparent border-none text-sm font-medium focus:outline-none focus:underline w-full" />
        </form>
    </td>
    <td class="py-2 px-3 text-sm text-neutral-500 capitalize">{{ a.type.replace('_', ' ') }}</td>
    <td class="py-2 px-3 text-sm text-right font-mono">{{ a.currency }} {{ "%.2f"|format(a.balance) }}</td>
    <td class="py-2 px-3 text-sm text-neutral-500">{{ "Yes" if a.is_spendable else "No" }}</td>
    <td class="py-2 px-3 text-right">
        <details class="inline-block">
            <summary class="text-xs text-neutral-400 cursor-pointer">Reconcile</summary>
            <form hx-post="/accounts/{{ a.id }}/reconcile" hx-target="#account-row-{{ a.id }}" hx-swap="outerHTML"
                  class="mt-1 flex gap-1">
                <input name="actual_balance" type="number" step="0.01" placeholder="Actual balance"
                       class="text-xs border border-neutral-300 rounded px-1 py-0.5 w-28" />
                <button type="submit" class="text-xs bg-neutral-800 text-white rounded px-2 py-0.5">Set</button>
            </form>
        </details>
        <form hx-post="/accounts/{{ a.id }}/archive" hx-target="closest table" hx-swap="outerHTML" class="inline">
            <button type="submit" class="text-xs text-neutral-400 hover:text-red-600 ml-2">
                {{ "Unarchive" if a.is_archived else "Archive" }}
            </button>
        </form>
    </td>
</tr>
{% if reconciled and reconciled.created %}
<tr><td colspan="5" class="text-xs text-green-700 px-3 py-1">Adjustment of {{ "%.2f"|format(reconciled.diff) }} recorded.</td></tr>
{% endif %}
