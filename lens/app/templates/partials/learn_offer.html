{% if learn_offer %}
<div id="learn-offer" hx-swap-oob="innerHTML:#learn-offer-region">
    <div class="rounded-control bg-accent-blue text-accent-blue-ink px-4 py-2.5 text-sm flex items-center gap-3 flex-wrap">
        <span>Always categorize <strong>{{ learn_offer.merchant }}</strong> as
            <strong>{{ learn_offer.category_name }}</strong>?</span>
        <form hx-post="/rules/learn" hx-swap="none" class="flex items-center gap-2 flex-wrap"
              hx-on::after-request="document.getElementById('learn-offer')?.remove()">
            <input type="hidden" name="txn_id" value="{{ learn_offer.txn_id }}" />
            <input type="hidden" name="category_id" value="{{ learn_offer.category_id }}" />
            <label class="flex items-center gap-1 text-xs">
                <input type="checkbox" name="back_apply" checked class="h-4 w-4" /> also fix past matches
            </label>
            <button type="submit" class="rounded-control bg-accent-blue-ink text-brand-ink px-3 py-1 text-xs font-medium">Yes</button>
        </form>
        <button class="text-xs underline" onclick="document.getElementById('learn-offer').remove()">No</button>
    </div>
</div>
{% endif %}
