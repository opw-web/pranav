<div class="rounded-control bg-accent-green text-accent-green-ink text-xs px-3 py-2 mt-1 flex items-center gap-2 flex-wrap">
    <span>Added <span class="font-mono">₹{{ "%.2f"|format(p.parsed.amount) }}</span> · {{ p.merchant_clean or "—" }} · {{ p.category_label }}
    · {{ p.parsed.txn_date }} · {{ p.account.name }}</span>
    {% if is_duplicate_warning %}<span class="text-accent-amber-ink">(looks similar to another transaction today)</span>{% endif %}
    <button hx-post="/txn/{{ txn_id }}/undo" hx-target="#txn-row-{{ txn_id }}" hx-swap="outerHTML" class="underline shrink-0">Undo</button>
</div>
<script>
    (function () {
        var bar = document.getElementById("quickadd-bar");
        if (bar) { bar.value = ""; bar.focus(); }
        var preview = document.getElementById("quickadd-preview");
        if (preview) { preview.innerHTML = ""; }
    })();
</script>
