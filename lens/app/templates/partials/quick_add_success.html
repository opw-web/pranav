<div class="text-xs text-green-700 py-1">
    Added ₹{{ "%.2f"|format(p.parsed.amount) }} · {{ p.merchant_clean or "—" }} · {{ p.category_label }}
    · {{ p.parsed.txn_date }} · {{ p.account.name }}
    {% if is_duplicate_warning %}<span class="text-amber-700 ml-2">(looks similar to another transaction today)</span>{% endif %}
    <button hx-post="/txn/{{ txn_id }}/undo" hx-target="#txn-row-{{ txn_id }}" hx-swap="outerHTML" class="ml-2 underline">Undo</button>
</div>
<script>
    (function () {
        var bar = document.getElementById("quickadd-bar");
        if (bar) { bar.value = ""; bar.focus(); }
        var preview = document.getElementById("quickadd-preview");
        if (preview) { preview.innerHTML = ""; }
    })();
</script>
