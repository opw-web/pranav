{% set toast_id = "toast-" ~ range(100000, 999999) | random %}
<div id="{{ toast_id }}"
     class="card flex items-center gap-2.5 px-4 py-3 text-sm shadow-pop
        {{ 'text-accent-red-ink' if kind == 'error' else 'text-ink' }}"
     hx-swap-oob="beforeend:#toast-region">
    {{ icon('warning', 'h-4 w-4 shrink-0 text-accent-red-ink') if kind == 'error' else icon('check', 'h-4 w-4 shrink-0 text-accent-green-ink') }}
    <span class="flex-1">{{ message }}</span>
    {% if undo_url %}
    <button class="shrink-0 text-xs font-medium text-brand hover:underline" hx-post="{{ undo_url }}"
            {% if undo_target %}hx-target="{{ undo_target }}" hx-swap="outerHTML"{% else %}hx-swap="none"{% endif %}>
        Undo
    </button>
    {% endif %}
</div>
<script>setTimeout(() => document.getElementById({{ toast_id | tojson }})?.remove(), 8000);</script>
