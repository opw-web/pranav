<tr id="txn-row-{{ t.id }}" class="border-b border-neutral-100 text-sm bg-neutral-50" x-data="{ categoryOpen: false }">
    <td class="py-2 px-2"></td>
    <td class="py-2 px-2">
        <input type="date" name="txn_date" value="{{ t.txn_date }}"
               hx-patch="/txn/{{ t.id }}" hx-trigger="change" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="border border-neutral-300 rounded px-1 py-0.5 text-sm w-32" />
    </td>
    <td class="py-2 px-3 text-neutral-400 whitespace-nowrap">{{ t.account_name }}</td>
    <td class="py-2 px-2">
        <input type="text" name="merchant_clean" value="{{ t.merchant_clean or '' }}"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="border border-neutral-300 rounded px-1 py-0.5 text-sm w-32" />
    </td>
    <td class="py-2 px-2 relative">
        <button type="button"
                @click="categoryOpen = !categoryOpen; window.lensCategoryTarget = {type: 'txn', id: '{{ t.id }}'}"
                class="px-2 py-0.5 rounded text-xs border border-neutral-300 bg-white">
            {{ t.category_name or 'Uncategorized' }}
        </button>
        <div x-show="categoryOpen" x-on:click.outside="categoryOpen = false" class="absolute z-10 mt-1 w-56" style="display:none">
            <input type="text" placeholder="Search or create…" autocomplete="off"
                   hx-get="/category-picker" hx-trigger="keyup changed delay:150ms, focus"
                   hx-target="#picker-slot-{{ t.id }}" hx-swap="innerHTML"
                   class="w-full border border-neutral-300 rounded px-2 py-1 text-xs mb-1" />
            <div id="picker-slot-{{ t.id }}"></div>
        </div>
    </td>
    <td class="py-2 px-2">
        <input type="number" step="0.01" name="amount" value="{{ t.amount }}"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="border border-neutral-300 rounded px-1 py-0.5 text-sm w-24 text-right" />
    </td>
    <td class="py-2 px-2 flex gap-1">
        <input type="text" name="notes" value="{{ t.notes or '' }}" placeholder="notes"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="border border-neutral-300 rounded px-1 py-0.5 text-sm w-24" />
        <input type="text" name="tags" value="{{ t.tags_csv or '' }}" placeholder="tags,comma"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="border border-neutral-300 rounded px-1 py-0.5 text-sm w-24" />
    </td>
    <td class="py-2 px-2 text-right">
        <button hx-get="/txn/{{ t.id }}" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
                class="text-xs text-neutral-400">Done</button>
    </td>
</tr>
