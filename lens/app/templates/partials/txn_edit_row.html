<tr id="txn-row-{{ t.id }}" class="flex flex-col gap-3 p-3 bg-subtle
    md:table-row md:flex-none md:gap-0 md:p-0" x-data="{ categoryOpen: false }">
    {# checkbox column — kept functional (not just a spacer) so bulk-select state
       and the 'x' keyboard shortcut (app.js: lensActiveRow.querySelector("input[type='checkbox']"))
       still work while a row is in edit mode. #}
    <td class="self-start shrink-0 md:table-cell md:w-8 md:py-2 md:px-2 md:align-middle">
        <label class="flex items-center justify-center min-w-[44px] min-h-[44px] md:min-w-0 md:min-h-0 md:w-4 md:h-4 cursor-pointer">
            <input type="checkbox" name="txn_ids" value="{{ t.id }}" class="h-[18px] w-[18px] md:h-4 md:w-4 rounded border-hair-strong accent-ink" />
        </label>
    </td>

    <td class="md:table-cell md:py-2 md:px-2">
        <label class="block text-xs text-muted mb-1 md:hidden">Date</label>
        <input type="date" name="txn_date" value="{{ t.txn_date }}"
               hx-patch="/txn/{{ t.id }}" hx-trigger="change" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="field md:w-32 md:min-h-0 md:py-1 md:text-sm" />
        <p class="text-xs text-faint mt-1 md:hidden">{{ t.account_name }}</p>
    </td>
    <td class="hidden md:table-cell md:py-2 md:px-3 md:text-muted md:whitespace-nowrap">{{ t.account_name }}</td>

    <td class="md:table-cell md:py-2 md:px-2">
        <label class="block text-xs text-muted mb-1 md:hidden">Merchant</label>
        <input type="text" name="merchant_clean" value="{{ t.merchant_clean or '' }}" placeholder="Merchant"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="field md:w-32 md:min-h-0 md:py-1 md:text-sm" />
    </td>

    <td class="relative md:table-cell md:py-2 md:px-2">
        <label class="block text-xs text-muted mb-1 md:hidden">Category</label>
        <button type="button"
                @click="categoryOpen = !categoryOpen; window.lensCategoryTarget = {type: 'txn', id: '{{ t.id }}'}"
                class="field w-full flex items-center justify-between md:w-auto md:min-h-0 md:py-1 md:px-2 md:text-xs">
            <span>{{ t.category_name or 'Uncategorized' }}</span>
            <span aria-hidden="true" class="text-faint">▾</span>
        </button>
        <div x-show="categoryOpen" x-cloak x-on:click.outside="categoryOpen = false"
             class="absolute z-10 mt-1 w-full sm:w-64">
            <input type="text" placeholder="Search or create…" autocomplete="off"
                   hx-get="/category-picker" hx-trigger="keyup changed delay:150ms, focus"
                   hx-target="#picker-slot-{{ t.id }}" hx-swap="innerHTML"
                   class="field mb-1 md:min-h-0 md:py-1 md:text-xs" />
            <div id="picker-slot-{{ t.id }}"></div>
        </div>
    </td>

    <td class="md:table-cell md:py-2 md:px-2">
        <label class="block text-xs text-muted mb-1 md:hidden">Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ t.amount }}"
               hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
               class="field font-mono md:w-24 md:min-h-0 md:py-1 md:text-sm md:text-right" />
    </td>

    <td class="flex flex-col gap-2 md:table-cell md:flex-row md:py-2 md:px-2">
        <div>
            <label class="block text-xs text-muted mb-1 md:hidden">Notes</label>
            <input type="text" name="notes" value="{{ t.notes or '' }}" placeholder="Notes"
                   hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
                   class="field md:w-24 md:min-h-0 md:py-1 md:text-sm" />
        </div>
        <div>
            <label class="block text-xs text-muted mb-1 md:hidden">Tags</label>
            <input type="text" name="tags" value="{{ t.tags_csv or '' }}" placeholder="tags,comma"
                   hx-patch="/txn/{{ t.id }}" hx-trigger="blur" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
                   class="field md:w-24 md:min-h-0 md:py-1 md:text-sm" />
        </div>
    </td>

    <td class="md:table-cell md:py-2 md:px-2 md:text-right md:w-10">
        <button hx-get="/txn/{{ t.id }}" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
                class="btn btn-primary w-full md:hidden">Done</button>
        <button hx-get="/txn/{{ t.id }}" hx-target="#txn-row-{{ t.id }}" hx-swap="outerHTML"
                class="hidden md:inline text-xs text-muted hover:text-ink">Done</button>
    </td>
</tr>
