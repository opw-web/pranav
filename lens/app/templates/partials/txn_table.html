<table class="w-full border-collapse text-sm" id="txn-table">
    <thead>
        <tr class="text-left text-xs uppercase text-neutral-400 border-b border-neutral-200">
            <th class="py-2 px-2"></th>
            <th class="py-2 px-3">Date</th>
            <th class="py-2 px-3">Account</th>
            <th class="py-2 px-3">Merchant</th>
            <th class="py-2 px-3">Category</th>
            <th class="py-2 px-3 text-right">Amount</th>
            <th class="py-2 px-3">Notes / Tags</th>
            <th class="py-2 px-3"></th>
        </tr>
    </thead>
    <tbody id="txn-tbody">
        {% for t in txns %}
            {% include "partials/txn_row.html" %}
        {% endfor %}
        {% if not txns %}
        <tr><td colspan="8" class="text-center text-sm text-neutral-400 py-8">No transactions yet.</td></tr>
        {% endif %}
    </tbody>
</table>
