{% extends "base.html" %}
{% block title %}Transactions — LENS{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto">
    <h1 class="text-lg font-semibold mb-4">Transactions</h1>

    <details class="bg-white border border-neutral-200 rounded-lg p-4 mb-4" open>
        <summary class="text-sm font-medium cursor-pointer mb-2">+ Add a transaction</summary>
        <form hx-post="/txn" hx-target="#txn-tbody" hx-swap="afterbegin" hx-on::after-request="this.reset()"
              class="mt-3 flex flex-wrap items-end gap-2">
            <div>
                <label class="block text-xs text-neutral-500">Account</label>
                <select name="account_id" required class="border border-neutral-300 rounded px-2 py-1 text-sm">
                    {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Type</label>
                <select name="type" required class="border border-neutral-300 rounded px-2 py-1 text-sm">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                    <option value="refund">Refund</option>
                    <option value="transfer">Transfer</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Amount</label>
                <input name="amount" type="number" step="0.01" required class="border border-neutral-300 rounded px-2 py-1 text-sm w-24" />
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Merchant</label>
                <input name="merchant_clean" type="text" class="border border-neutral-300 rounded px-2 py-1 text-sm w-32" />
            </div>
            <div class="relative" x-data="{ open: false }">
                <label class="block text-xs text-neutral-500">Category</label>
                <input type="hidden" name="category_id" id="new-txn-category-id" />
                <button type="button"
                        @click="open = !open; window.lensCategoryTarget = {type: 'new', idFieldId: 'new-txn-category-id', labelFieldId: 'new-txn-category-label'}"
                        class="border border-neutral-300 rounded px-2 py-1 text-sm bg-white">
                    <span id="new-txn-category-label">Uncategorized</span>
                </button>
                <div x-show="open" x-on:click.outside="open = false" class="absolute z-10 mt-1 w-56" style="display:none">
                    <input type="text" placeholder="Search or create…" autocomplete="off"
                           hx-get="/category-picker" hx-trigger="keyup changed delay:150ms, focus"
                           hx-target="#new-txn-picker-slot" hx-swap="innerHTML"
                           class="w-full border border-neutral-300 rounded px-2 py-1 text-xs mb-1" />
                    <div id="new-txn-picker-slot"></div>
                </div>
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Date</label>
                <input name="txn_date" type="date" value="{{ today }}" required class="border border-neutral-300 rounded px-2 py-1 text-sm" />
            </div>
            <div>
                <label class="block text-xs text-neutral-500">To account (transfer)</label>
                <select name="transfer_account_id" class="border border-neutral-300 rounded px-2 py-1 text-sm">
                    <option value="">—</option>
                    {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Notes</label>
                <input name="notes" type="text" class="border border-neutral-300 rounded px-2 py-1 text-sm w-28" />
            </div>
            <div>
                <label class="block text-xs text-neutral-500">Tags</label>
                <input name="tags" type="text" placeholder="goa,trip" class="border border-neutral-300 rounded px-2 py-1 text-sm w-24" />
            </div>
            <button type="submit" class="bg-neutral-800 text-white rounded px-3 py-1.5 text-sm">Add</button>
        </form>
    </details>

    <form id="txn-bulk-form" class="bg-white border border-neutral-200 rounded-lg overflow-hidden">
        <div class="flex items-center gap-2 px-3 py-2 border-b border-neutral-100 bg-neutral-50 text-xs">
            <span class="text-neutral-500">Bulk:</span>
            <button type="button" hx-post="/txn/bulk" hx-vals='{"action":"delete"}' hx-target="#txn-table" hx-swap="outerHTML"
                    hx-include="closest form" hx-confirm="Delete all selected transactions?"
                    class="text-red-600 hover:underline">Delete selected</button>
            <span class="text-neutral-300">|</span>
            <span>Set category:</span>
            <select name="bulk_category_id" class="border border-neutral-300 rounded px-1 py-0.5">
                <option value="">Uncategorized</option>
                {% for c in categories %}<option value="{{ c.id }}">{{ c.label }}</option>{% endfor %}
            </select>
            <button type="button" hx-post="/txn/bulk" hx-vals='{"action":"category"}' hx-target="#txn-table" hx-swap="outerHTML"
                    hx-include="closest form" class="text-neutral-700 hover:underline">Apply</button>
        </div>
        {% include "partials/txn_table.html" %}
    </form>
</div>
{% endblock %}
